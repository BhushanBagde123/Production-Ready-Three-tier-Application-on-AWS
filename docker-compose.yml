version: "3.8"

services:

  frontend:
    image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/frontend-ecr-repo:v1
    container_name: frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  backend:
    image: ACCOUNT_ID.dkr.ecr.ap-south-1.amazonaws.com/backend-ecr-repo:v1
    container_name: backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      DB_HOST: DB_HOST
      DB_USER: admin
      DB_PASSWORD: password
      DB_NAME: formdb